name: Copa 2026 Memorial Updater

on:
  schedule:
    # Roda a cada hora para capturar novos jogos finalizados ou lives iniciadas
    - cron: '0 * * * *'
  workflow_dispatch: # Permite rodar manualmente pelo painel do GitHub

permissions:
  contents: write # Permissão para commitar de volta as atualizações de placar e links

jobs:
  update-memorial:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Atualizador e Indexador da Copa
        run: python updater.py

      - name: Commit e Push das Atualizações
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add index.html matches.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Placar e vídeos da Copa 2026 ($(date +'%d/%m/%Y %H:%M'))" && git push)
